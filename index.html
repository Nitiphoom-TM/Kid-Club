<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kid Club - สวนสนุกและการเรียนรู้สำหรับเด็ก</title>
  
  <!-- PWA & Mobile Config -->
  <meta name="description" content="พื้นที่การเรียนรู้ นิทานโต้ตอบ และเกมพัฒนาทักษะ สำหรับเด็กวัย 2-3 ปี">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  
  <!-- Font Setup -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css?family=Kanit:300,400,500,600|Mitr:400,500,600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- App Wrapper -->
  <div id="app-container">
    
    <!-- 1. MAIN HUB SCREEN (หน้าหลักสวนสนุก) -->
    <div id="welcome-screen" class="screen active">
      <header class="hub-header">
        <div class="host-badge">
          <img src="assets/images/host_elephant.jpg" alt="พี่ช้างน้อย" class="bounce-loop">
          <span class="host-bubble">ยินดีต้อนรับสู่ Kid Club!</span>
        </div>
        <h1 class="hub-title">Kid Club</h1>
      </header>
      
      <main class="hub-menu-grid">
        <!-- Card 1: Learning World -->
        <button class="hub-card card-learning" data-target="learning-menu-screen">
          <div class="card-emoji">📚</div>
          <div class="card-label">หมวดเรียนรู้</div>
        </button>
        
        <!-- Card 2: Story World -->
        <button class="hub-card card-stories" data-target="story-menu-screen">
          <div class="card-emoji">📖</div>
          <div class="card-label">หมวดเล่นนิทาน</div>
        </button>
        
        <!-- Card 3: Game World -->
        <button class="hub-card card-games" data-target="games-menu-screen">
          <div class="card-emoji">🎮</div>
          <div class="card-label">หมวดเกมส์</div>
        </button>
      </main>
    </div>

    <!-- 2. LEARNING MENU SCREEN (เมนูย่อยหมวดเรียนรู้) -->
    <div id="learning-menu-screen" class="screen">
      <header class="sub-header">
        <button class="btn-back-home btn-circle-nav">🏠</button>
        <h2>หมวดเรียนรู้</h2>
        <div style="width:50px;"></div>
      </header>
      
      <main class="sub-menu-grid">
        <button class="menu-item-card" data-learn="thai">🇹🇭 ภาษาไทย ก-ฮ</button>
        <button class="menu-item-card" data-learn="english">🇬🇧 ภาษาอังกฤษ A-Z</button>
        <button class="menu-item-card" data-learn="colors">🎨 เรียนรู้สีสัน</button>
        <button class="menu-item-card" data-learn="fruits">🍎 เรียนรู้ผลไม้</button>
        <button class="menu-item-card" data-learn="vehicles">🚗 เรียนรู้เรื่องรถ</button>
        <button class="menu-item-card" data-learn="home">🏠 ของใช้ในบ้าน</button>
        <button class="menu-item-card" data-learn="careers">👮 เรียนรู้อาชีพ</button>
      </main>
    </div>

    <!-- 3. LEARNING PLAY GRID SCREEN (กระดานการเรียนรู้หลัก) -->
    <div id="learning-grid-screen" class="screen">
      <header class="sub-header">
        <button class="btn-back-to btn-circle-nav" data-target="learning-menu-screen">◀</button>
        <h2 id="learning-grid-title">การเรียนรู้</h2>
        <div style="width:50px;"></div>
      </header>
      
      <main class="learning-grid-container">
        <div id="learning-grid" class="grid-content">
          <!-- Dynamic cards injected by JS -->
        </div>
      </main>
    </div>

    <!-- 4. STORY MENU SCREEN (เมนูนิทาน) -->
    <div id="story-menu-screen" class="screen">
      <header class="sub-header">
        <button class="btn-back-home btn-circle-nav">🏠</button>
        <h2>หมวดเล่นนิทาน</h2>
        <div style="width:50px;"></div>
      </header>
      
      <main class="story-list-container">
        <!-- Story 1: Rabbit & Tortoise -->
        <button class="story-list-item active" data-story="rabbit_and_tortoise">
          <img src="assets/images/page1.jpg" alt="กระต่ายกับเต่า">
          <div class="story-item-info">
            <h3>กระต่ายกับเต่า</h3>
            <p>ความเพียรพยายามและไม่ประมาท</p>
          </div>
        </button>

        <!-- Story 2: Lion & Mouse -->
        <button class="story-list-item active" data-story="lion_mouse">
          <img src="assets/images/lion_mouse/page1.jpg" alt="ราชสีห์กับหนู">
          <div class="story-item-info">
            <h3>ราชสีห์กับหนู</h3>
            <p>ความมีน้ำใจและการช่วยเหลือกัน</p>
          </div>
        </button>

        <!-- Story 3: Little Bird -->
        <button class="story-list-item active" data-story="little_bird">
          <img src="assets/images/little_bird/page1.jpg" alt="นกน้อยกับฤดูใบไม้ผลิ">
          <div class="story-item-info">
            <h3>นกน้อยกับฤดูใบไม้ผลิ</h3>
            <p>ความกล้าที่จะลองทำสิ่งใหม่ๆ</p>
          </div>
        </button>

        <!-- Story 4: Little Ant -->
        <button class="story-list-item active" data-story="little_ant">
          <img src="assets/images/little_ant/page1.jpg" alt="มดน้อยกับเมล็ดข้าวโพด">
          <div class="story-item-info">
            <h3>มดน้อยกับเมล็ดข้าวโพด</h3>
            <p>ความมุ่งมั่นพยายามไม่ล้มเลิก</p>
          </div>
        </button>

        <!-- Story 5: Clean Teeth -->
        <button class="story-list-item active" data-story="clean_teeth">
          <img src="assets/images/host_elephant.jpg" alt="พี่ช้างฟันสะอาด">
          <div class="story-item-info">
            <h3>พี่ช้างฟันสะอาด</h3>
            <p>สุขอนามัย ชวนเด็กๆ แปรงฟัน</p>
          </div>
        </button>
      </main>
    </div>

    <!-- 5. STORY PLAY SCREEN (เครื่องเล่นนิทานหลัก) -->
    <div id="story-screen" class="screen">
      <header class="story-header">
        <button class="btn-back-to btn-circle-nav" data-target="story-menu-screen">◀</button>
        <button id="btn-settings-toggle" class="btn-circle-nav">⚙️</button>
      </header>

      <main class="story-stage">
        <!-- Interactive Illustration Area -->
        <div class="illustration-container">
          <img id="scene-image" src="" alt="ฉากนิทาน">
          <div id="interactive-overlay"></div>
        </div>
      </main>

      <!-- Reworked Footprint Navigation Footer with Center Replay -->
      <footer class="story-footer">
        <!-- Back Footprint -->
        <button id="btn-prev" class="btn-footprint">
          <div class="footprint-icon">🐾</div>
          <span class="footprint-label">ย้อนกลับ</span>
        </button>
        
        <!-- Center Replay and Page Indicator -->
        <div class="story-footer-center">
          <button id="btn-replay" class="btn-replay-cute">
            <span class="replay-icon">🐰🔄</span>
            <span class="replay-label">เล่าอีกรอบ</span>
          </button>
          <div class="page-indicator">
            หน้า <span id="current-page-num">1</span>/7
          </div>
        </div>
        
        <!-- Next Footprint (Alert Glow when ended) -->
        <button id="btn-next" class="btn-footprint">
          <div class="footprint-glow-container">
            <div class="footprint-glow"></div>
            <div class="footprint-icon">🐾</div>
          </div>
          <span class="footprint-label">ถัดไป</span>
        </button>
      </footer>
    </div>

    <!-- Parents Settings Modal (Overlay) -->
    <div id="settings-overlay" class="settings-overlay">
      <div class="settings-card">
        <h3 class="settings-title">ตั้งค่าสำหรับคุณพ่อคุณแม่ ⚙️</h3>
        
        <div class="setting-item">
          <span class="setting-label">เสียงเล่าเรื่อง:</span>
          <button id="settings-sound-btn" class="settings-toggle-btn">เปิดเสียง 🔊</button>
        </div>
        
        <div class="setting-item">
          <span class="setting-label">ความเร็วในการเล่า:</span>
          <div class="settings-speed-grid">
            <button class="btn-speed" data-speed="0.5">0.5x 🐢🐢</button>
            <button class="btn-speed" data-speed="0.75">0.75x 🐢</button>
            <button class="btn-speed active" data-speed="1.0">1.0x 🚶</button>
            <button class="btn-speed" data-speed="1.25">1.25x 🏃</button>
            <button class="btn-speed" data-speed="1.5">1.5x 🚀</button>
          </div>
        </div>
        
        <button id="btn-settings-close" class="btn-settings-close-btn">ตกลง 👍</button>
      </div>
    </div>

    <!-- 6. GAMES MENU SCREEN (เมนูหมวดเกมส์) -->
    <div id="games-menu-screen" class="screen">
      <header class="sub-header">
        <button class="btn-back-home btn-circle-nav">🏠</button>
        <h2>หมวดเกมส์</h2>
        <div style="width:50px;"></div>
      </header>
      
      <main class="sub-menu-grid">
        <button class="menu-item-card game-card" data-game="soundboard">🐱 บอร์ดเสียงสัตว์หรรษา</button>
        <button class="menu-item-card game-card" data-game="sorter">🔴 กล่องคัดแยกสีของเล่น</button>
      </main>
    </div>

    <!-- 7. GAME PLAY SCREEN (หน้าเล่นเกมส์) -->
    <div id="game-play-screen" class="screen">
      <header class="sub-header">
        <button class="btn-back-to btn-circle-nav" data-target="games-menu-screen">◀</button>
        <h2 id="game-play-title">เล่นเกมส์</h2>
        <div style="width:50px;"></div>
      </header>
      
      <main class="game-stage">
        <div id="game-canvas">
          <!-- Game elements dynamically loaded here -->
        </div>
      </main>
    </div>

  </div>

  <!-- Audio elements -->
  <audio id="narration-audio"></audio>

  <script src="index.js"></script>
</body>
</html>
